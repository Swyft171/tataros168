/* --- Fire Embers Effect (Diagonal) --- */
.fire-particle {
    position: fixed;
    top: -20px;
    left: -20px;
    width: 3px;
    height: 3px;
    background: linear-gradient(45deg, #ff4d00, #ffae00);
    border-radius: 50%;
    filter: blur(0.5px);
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 0 8px #ff4d00, 0 0 15px #ffae00;
    opacity: 0;
    /* ใช้ cubic-bezier เพื่อให้การตกดูมีน้ำหนัก */
    animation: diagonalFall linear infinite;
}

@keyframes diagonalFall {
    0% {
        transform: translate(var(--start-x), var(--start-y)) scale(0);
        opacity: 0;
    }
    10% {
        opacity: 1;
        transform: translate(calc(var(--start-x) + 20px), calc(var(--start-y) + 20px)) scale(1);
    }
    90% {
        opacity: 0.8;
    }
    100% {
        /* ตกเฉียงไปทางขวาล่าง */
        transform: translate(calc(var(--start-x) + 600px), calc(var(--start-y) + 100vh)) scale(0);
        opacity: 0;
    }
}

/* พื้นหลังมืดหลัง Popup */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85); /* มืด 85% */

    align-items: center;

}

/* เมื่อสั่งเปิด Popup */
.modal-overlay.active {
    opacity: 1;
    visibility: visible;
}

/* กล่องเนื้อหา Popup */

.modal-overlay.active .modal-content {

<script>
    
    // --- ระบบเล่นเพลง (Widget sss.html) ---//
const audio = document.getElementById('bgMusic');
const musicToggle = document.getElementById('musicToggle');
const playStatus = document.getElementById('playStatus');
const musicArt = document.getElementById('musicArt');

// ตั้งค่าความดัง 50%
audio.volume = 0.5;

function toggleMusic() {
    if (audio.paused) {
        audio.play().then(() => {
            // ปรับ UI เมื่อเล่นเพลง
            playStatus.innerText = '⏸';
            musicArt.style.animation = 'rotateArt 4s linear infinite';
            // หากมีส่วนแสดงชื่อเพลง (song-info) ให้ลบ Class ซ่อนออก
            const songInfo = document.getElementById('song-info');
            if(songInfo) songInfo.classList.remove('opacity-0', 'translate-x-5');
        }).catch(error => {
            console.log("Autoplay ถูกบล็อก: ต้องคลิกหน้าจอก่อน", error);
        });
    } else {
        audio.pause();
        // ปรับ UI เมื่อหยุดเพลง
        playStatus.innerText = '▶';
        musicArt.style.animation = 'none';
        const songInfo = document.getElementById('song-info');
        if(songInfo) songInfo.classList.add('opacity-0', 'translate-x-5');
    }
}

// พยายามเล่นทันทีที่โหลดเสร็จ (Autoplay Policy)
window.addEventListener('load', () => {
    audio.play().then(() => {
        // ถ้า Autoplay สำเร็จ (บาง Browser ยอม)
        playStatus.innerText = '⏸';
        musicArt.style.animation = 'rotateArt 4s linear infinite';
    }).catch(() => {
        // ถ้าโดนบล็อก ให้รอการคลิกครั้งแรกของ User เพื่อเริ่มเล่น
        document.addEventListener('click', () => {
            if (audio.paused) toggleMusic();
        }, { once: true });
    });
});

// เชื่อมต่อปุ่มเปิด-ปิด
musicToggle.addEventListener('click', (e) => {
    e.stopPropagation(); // ป้องกัน Event ไหลไปทับกับ click ของ document
    toggleMusic();
});

    // เมื่อโหลดหน้าเว็บเสร็จ ให้สั่งเปิด Popup ทันที
    window.onload = function() {
        document.getElementById('welcome-modal').classList.add('active');
    };

    // ฟังก์ชันปิด Popup
    function closeModal() {
        document.getElementById('welcome-modal').classList.remove('active');
    }
    
    // คลิกพื้นที่ด้านนอกเพื่อปิด
    window.onclick = function(event) {
        var modal = document.getElementById('welcome-modal');
        if (event.target == modal) {
            closeModal();
        }
    }

    function createFire() {
    const particle = document.createElement('div');
    particle.classList.add('fire-particle');
    
    // กำหนดจุดเริ่มต้นสุ่มเฉพาะมุมบนซ้าย (0 ถึง 60% ของความกว้างหน้าจอ)
    // เพื่อให้มันตกเฉียงลงไปทางขวาได้ทั่วถึง
    const startX = Math.random() * (window.innerWidth * 0.6) - 50;
    const startY = Math.random() * -100; // เริ่มจากเหนือขอบจอขึ้นไป
    
    // สุ่มขนาดให้มีเล็กบ้างใหญ่บ้างดูสมจริง
    const size = Math.random() * 3 + 1 + 'px';
    // สุ่มเวลาตก (ความเร็วไม่เท่ากัน)
    const duration = Math.random() * 4 + 3 + 's'; 
    
    particle.style.width = size;
    particle.style.height = size;
    
    // ส่งค่าตำแหน่งเริ่มต้นไปยัง CSS Variable
    particle.style.setProperty('--start-x', startX + 'px');
    particle.style.setProperty('--start-y', startY + 'px');
    particle.style.animationDuration = duration;
    
    // สุ่มดีเลย์เล็กน้อยเพื่อให้ไฟไม่ตกลงมาเป็นก้อนเดียว
    particle.style.animationDelay = Math.random() * 2 + 's';

    document.body.appendChild(particle);
    
    // ลบ Element ทิ้งเมื่อจบอนิเมชั่น
    setTimeout(() => {
        particle.remove();
    }, (parseFloat(duration) + 2) * 1000);
}

// สร้างเศษไฟต่อเนื่อง (ปรับตัวเลข 200 เป็นน้อยลงถ้าต้องการให้ไฟเยอะขึ้น)
setInterval(createFire, 200);

(function() {
    // 1. กันคลิกขวาและปุ่มลัด
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || 
            (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || 
            (e.ctrlKey && e.keyCode == 85)) {
            return false;
        }
    };

    // 2. ฟังก์ชันตรวจจับ DevTools (ถ้าเปิด Console หน้าเว็บจะถูกล้างทันที)
    setInterval(function() {
        const threshold = 160;
        if (window.outerWidth - window.innerWidth > threshold || 
            window.outerHeight - window.innerHeight > threshold) {
            document.body.innerHTML = "<h1>DETECTED: Access Denied</h1>";
            window.location.href = "about:blank";
        }
    }, 500);

    // 3. Infinite Debugger Loop (ถ้าเปิด Inspect จะติด Loop จน Browser ค้าง)
    (function() {
        (function d(i) {
            if (("" + i / i).length !== 1 || i % 20 === 0) {
                (function() {}.constructor("debugger")());
            } else {
                debugger;
            }
            d(++i);
        })(0);
    })();
})();

</script>
