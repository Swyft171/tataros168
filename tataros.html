/* Stats Bar แก้ไขให้เรียง 5 กล่องเสมอและไม่ทับกัน */
.stats-bar { 
    display: grid;

    gap: 15px; 
    max-width: 1200px; 
    margin: 40px auto; 
    padding: 0 20px;
    position: relative;
    z-index: 10;

.stat-card {
    background: rgba(10, 10, 12, 0.8);
    border-radius: 20px;
    padding: 25px 10px;

/* แก้ไขขนาดตัวเลขไม่ให้ใหญ่เกินจนล้นกล่อง */
.stat-number { 
    font-size: 32px !important; 
    font-weight: 800; 
    margin-bottom: 5px;
}
.stat-card {
    padding: 20px 5px; /* ลด Padding บน-ล่าง */
}

.stat-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 2px; /* ความหนาของขอบ */
    background: linear-gradient(135deg, var(--glow-color), transparent, var(--glow-color));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.3;
    transition: 0.5s;
}

.stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 10%; width: 80%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--glow-color), transparent);
}

.stat-card:hover {
    transform: translateY(-12px) scale(1.05);
    background: rgba(255, 255, 255, 0.05);
}

.stat-card:hover::before {
    opacity: 1;
}
.stat-number { 
    font-size: 42px; 
    font-weight: 800; 
    display: block; 
    font-family: 'Outfit', sans-serif;
    color: #fff;
    text-shadow: 0 0 20px var(--glow-color);

}

.stat-label {

/* อนิเมชั่นตัวเลขเต้นเป็นจังหวะ */

/* --- Fire Embers Effect (Diagonal) --- */
.fire-particle {
    position: fixed;
    top: -20px;
    left: -20px;
    width: 3px;
    height: 3px;
    background: linear-gradient(45deg, #ff4d00, #ffae00);
    border-radius: 50%;
    filter: blur(0.5px);
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 0 8px #ff4d00, 0 0 15px #ffae00;
    opacity: 0;
    /* ใช้ cubic-bezier เพื่อให้การตกดูมีน้ำหนัก */
    animation: diagonalFall linear infinite;
}

@keyframes diagonalFall {
    0% {
        transform: translate(var(--start-x), var(--start-y)) scale(0);
        opacity: 0;
    }
    10% {
        opacity: 1;
        transform: translate(calc(var(--start-x) + 20px), calc(var(--start-y) + 20px)) scale(1);
    }
    90% {
        opacity: 0.8;
    }
    100% {
        /* ตกเฉียงไปทางขวาล่าง */
        transform: translate(calc(var(--start-x) + 600px), calc(var(--start-y) + 100vh)) scale(0);
        opacity: 0;
    }
}

function renderStats() {
    const counts = {
        total: members.length,
        founder: members.filter(m => m.rank === 'theboss').length,
        leader: members.filter(m => m.rank === 'leader').length,
        staff: members.filter(m => m.rank.toLowerCase() === 'staff').length,
        member: members.filter(m => m.rank === 'member' || m.rank === 'vip').length
    };

    document.getElementById('statsBar').innerHTML = `
        <div class="stat-card" style="--glow-color: #fbbf24">
            <span class="stat-number" style="color: #fbbf24; text-shadow: 0 0 15px rgba(251, 191, 36, 0.6);">${counts.founder}</span>
            <span class="stat-label">THE BOSS</span>
        </div>

        <div class="stat-card" style="--glow-color: #ef4444">
            <span class="stat-number" style="color: #ef4444; text-shadow: 0 0 15px rgba(239, 68, 68, 0.6);">${counts.leader}</span>
            <span class="stat-label">LEADER</span>
        </div>

        <div class="stat-card" style="--glow-color: #DB7093">
            <span class="stat-number" style="color: #DB7093; text-shadow: 0 0 15px "color: #DB7093;">${counts.staff}</span>
            <span class="stat-label">STAFF</span>
        </div>

        <div class="stat-card" style="--glow-color: #3b82f6">
            <span class="stat-number" style="color: #3b82f6; text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);">${counts.member}</span>
            <span class="stat-label">MEMBER</span>
        </div>

        <div class="stat-card" style="--glow-color: #ffffff">
            <span class="stat-number" style="color: #ffffff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);">${counts.total}</span>
            <span class="stat-label">SYSTEM ACTIVE</span>
        </div>
    `;
}

function renderMembers() {
    let html = '';
    const groups = [
        { title: 'Founders', rank: 'theboss', color: '#fbbf24' },
        { title: 'Leaders', rank: 'leader', color: '#ef4444' },
        { title: 'Staff', rank: 'staff', color: '#DB7093' } // เพิ่มบรรทัดนี้ครับ
    ];

    // 1. แสดงกลุ่ม Founders และ Leaders แบบปกติ (แสดงทุกคน)
    groups.forEach(group => {
        const groupMembers = members.filter(m => m.rank === group.rank);
        if (groupMembers.length > 0) {
            html += generateGrid(group.title, groupMembers, group.color, group.rank);
        }
    });

    // 2. จัดการกลุ่ม Member แบบแบ่งหน้า (Pagination)
    const allNormalMembers = members.filter(m => m.rank === 'member' || m.rank === 'vip');
    const totalPages = Math.ceil(allNormalMembers.length / itemsPerPage);
    
    // ตัดเอาเฉพาะ 12 คนของหน้านั้นๆ
    const startIndex = (currentPage - 1) * itemsPerPage;
    const paginatedMembers = allNormalMembers.slice(startIndex, startIndex + itemsPerPage);

    if (paginatedMembers.length > 0) {
        html += generateGrid('Members', paginatedMembers, '#3b82f6', 'member', allNormalMembers.length);
    }

    document.getElementById('memberContent').innerHTML = html;
    renderPaginationControls(totalPages);
}

// ฟังก์ชันสร้างการ์ด (ช่วยให้ Code สะอาดขึ้น)
function generateGrid(title, groupMembers, color, rank, totalCount) {
   // ใช้สีประจำยศ (color) มาสร้างตัวแปร CSS เฉพาะสำหรับการ์ดในกลุ่มนี้
    let gridHtml = `<h2 class="rank-title" id="rank-${rank}">${title} <span>/ ${totalCount || groupMembers.length}</span></h2><div class="grid">`;
    
    groupMembers.forEach(m => {
        // เช็คว่าถ้าเป็นยศสูง ให้ใช้ไอคอนมงกุฎ ถ้าไม่ใช่ใช้ไอคอน User
        const rankIcon = (rank === 'theboss' || rank === 'leader' || rank === 'staff') 
            ? `<img src="https://img2.pic.in.th/Gemini_Generated_Image_f77o6qf77o6qf77o-Photoroom.png" style="width:16px; height:16px; margin-right:5px; vertical-align:middle;">`
            : `<i class="fas fa-user" style="margin-right:5px;"></i>`;

        gridHtml += `
            <div class="member-card" style="--accent-color: ${color}" onclick="openModal('${m.name}', '${title.slice(0,-1).toUpperCase()}', '${m.avatar}', '${m.facebook}', '${color}')">
                <div class="avatar-wrap">
                    <img src="${m.avatar}" class="avatar">
                    <div class="online-dot"></div>
                </div>
                <div class="info">
                    <div class="rank-tag" style="color: ${color}">${title.toUpperCase().slice(0, -1)} ${rankIcon}</div>
                    <div class="name">${m.name}</div>
                </div>
                <div class="hover-social">
                    <a href="${m.facebook}" target="_blank" class="fb-btn-small" style="background: ${color}; color: #000" onclick="event.stopPropagation();">
    <i class="fab fa-facebook"></i> PROFILE
</a>
                </div>
            </div>`;
    });
    gridHtml += `</div>`;
    return gridHtml;
}

function renderPaginationControls(totalPages) {
    const container = document.getElementById('pagination-controls');
    
    // ถ้ามีหน้าเดียว ไม่ต้องแสดงปุ่ม
    if (totalPages <= 1) { 
        container.innerHTML = ''; 
        return; 
    }

    // ปุ่มย้อนกลับ <
    let pgHtml = `
        <button class="pg-arrow" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
            <i class="fas fa-chevron-left"></i>
        </button>
    `;

    // วนลูปสร้างปุ่มตัวเลข 1, 2, 3...
    for (let i = 1; i <= totalPages; i++) {
        pgHtml += `
            <button onclick="changePage(${i})" 
                    class="pg-btn ${i === currentPage ? 'active' : ''}">
                ${i}
            </button>
        `;
    }

    // ปุ่มไปข้างหน้า >
    pgHtml += `
        <button class="pg-arrow" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
            <i class="fas fa-chevron-right"></i>
        </button>
    `;

    container.innerHTML = pgHtml;
}

function changePage(page) {
    currentPage = page;
    renderMembers();
    // เลื่อนกลับไปดูที่หัวข้อ Member
    document.getElementById('rank-member').scrollIntoView({ behavior: 'smooth' });
}
    // สั่งให้ระบบเริ่มทำงาน
    init();

document.getElementById('memberSearch').addEventListener('input', function(e) {
    const searchTerm = e.target.value.toLowerCase();
    
    // 1. Stats Bar ไม่ต้องหาย (เราจะเอาคำสั่งซ่อนออก)
    const statsBar = document.getElementById('statsBar');
    statsBar.style.display = 'grid'; // บังคับให้แสดงไว้ตลอด

    // 2. จัดการรายชื่อและหัวข้อยศ (Rank Title)
    const sections = document.querySelectorAll('.container > div.grid');
    
    sections.forEach(grid => {
        const title = grid.previousElementSibling; // ตัว h2 (Rank Title)
        const cards = grid.querySelectorAll('.member-card');
        let hasVisibleCard = false;

        cards.forEach(card => {
            const name = card.querySelector('.name').textContent.toLowerCase();
            if (name.includes(searchTerm)) {
                card.style.display = 'flex';
                hasVisibleCard = true;
            } else {
                card.style.display = 'none';
            }
        });

        // ถ้ากลุ่มไหนมีคนตรงกับที่ค้นหา ให้แสดงหัวข้อ ถ้าไม่มีให้ซ่อน
        if (hasVisibleCard) {
            title.style.display = 'block';
            grid.style.display = 'grid';
        } else {
            title.style.display = 'none';
            grid.style.display = 'none';
        }
    });
});

// ดึง Element จาก HTML เดิม
const audio = document.getElementById('bgMusic');
const musicToggle = document.getElementById('musicToggle');
const playStatus = document.getElementById('playStatus');
const musicArt = document.getElementById('musicArt');

// ตั้งค่าความดัง 50%
audio.volume = 0.5;

function toggleMusic() {
    if (audio.paused) {
        audio.play().then(() => {
            // ปรับ UI เมื่อเล่นเพลง
            playStatus.innerText = '⏸';
            musicArt.style.animation = 'rotateArt 4s linear infinite';
            // หากมีส่วนแสดงชื่อเพลง (song-info) ให้ลบ Class ซ่อนออก
            const songInfo = document.getElementById('song-info');
            if(songInfo) songInfo.classList.remove('opacity-0', 'translate-x-5');
        }).catch(error => {
            console.log("Autoplay ถูกบล็อก: ต้องคลิกหน้าจอก่อน", error);
        });
    } else {
        audio.pause();
        // ปรับ UI เมื่อหยุดเพลง
        playStatus.innerText = '▶';
        musicArt.style.animation = 'none';
        const songInfo = document.getElementById('song-info');
        if(songInfo) songInfo.classList.add('opacity-0', 'translate-x-5');
    }
}

// พยายามเล่นทันทีที่โหลดเสร็จ (Autoplay Policy)
window.addEventListener('load', () => {
    audio.play().then(() => {
        // ถ้า Autoplay สำเร็จ (บาง Browser ยอม)
        playStatus.innerText = '⏸';
        musicArt.style.animation = 'rotateArt 4s linear infinite';
    }).catch(() => {
        // ถ้าโดนบล็อก ให้รอการคลิกครั้งแรกของ User เพื่อเริ่มเล่น
        document.addEventListener('click', () => {
            if (audio.paused) toggleMusic();
        }, { once: true });
    });
});

// เชื่อมต่อปุ่มเปิด-ปิด
musicToggle.addEventListener('click', (e) => {
    e.stopPropagation(); // ป้องกัน Event ไหลไปทับกับ click ของ document
    toggleMusic();
});

function openModal(name, rank, img, fb, color) {
    const modalName = document.getElementById('modalName');
    const modalRank = document.getElementById('modalRank');
    const modalFB = document.getElementById('modalFB');
    const archiveBio = document.querySelector('.archive-bio');
    const archiveCard = document.querySelector('.archive-card');

    modalName.innerText = name;

    document.getElementById('modalBanner').style.backgroundImage = `url('${img || 'https://via.placeholder.com/500'}')`;
    modalFB.href = fb;

    // ดึงสีจากหน้าการ์ดมาใส่ใน Modal
    modalRank.style.color = color;
    modalFB.style.backgroundColor = color;

function createFire() {

    const startX = Math.random() * (window.innerWidth * 0.6) - 50;
    const startY = Math.random() * -100; // เริ่มจากเหนือขอบจอขึ้นไป
    
    // สุ่มขนาดให้มีเล็กบ้างใหญ่บ้างดูสมจริง
    const size = Math.random() * 3 + 1 + 'px';
    // สุ่มเวลาตก (ความเร็วไม่เท่ากัน)
    const duration = Math.random() * 4 + 3 + 's'; 
    
    particle.style.width = size;
    particle.style.height = size;
    
    // ส่งค่าตำแหน่งเริ่มต้นไปยัง CSS Variable
    particle.style.setProperty('--start-x', startX + 'px');
    particle.style.setProperty('--start-y', startY + 'px');
    particle.style.animationDuration = duration;
    
    // สุ่มดีเลย์เล็กน้อยเพื่อให้ไฟไม่ตกลงมาเป็นก้อนเดียว
    particle.style.animationDelay = Math.random() * 2 + 's';

    document.body.appendChild(particle);
    
    // ลบ Element ทิ้งเมื่อจบอนิเมชั่น
    setTimeout(() => {
        particle.remove();
    }, (parseFloat(duration) + 2) * 1000);
}

// สร้างเศษไฟต่อเนื่อง (ปรับตัวเลข 200 เป็นน้อยลงถ้าต้องการให้ไฟเยอะขึ้น)
setInterval(createFire, 200);

(function() {
    // 1. กันคลิกขวาและปุ่มลัด
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || 
            (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || 
            (e.ctrlKey && e.keyCode == 85)) {
            return false;
        }
    };

    // 2. ฟังก์ชันตรวจจับ DevTools (ถ้าเปิด Console หน้าเว็บจะถูกล้างทันที)
    setInterval(function() {
        const threshold = 160;
        if (window.outerWidth - window.innerWidth > threshold || 
            window.outerHeight - window.innerHeight > threshold) {
            document.body.innerHTML = "<h1>DETECTED: Access Denied</h1>";
            window.location.href = "about:blank";
        }
    }, 500);

    // 3. Infinite Debugger Loop (ถ้าเปิด Inspect จะติด Loop จน Browser ค้าง)
    (function() {
        (function d(i) {
            if (("" + i / i).length !== 1 || i % 20 === 0) {
                (function() {}.constructor("debugger")());
            } else {
                debugger;
            }
            d(++i);
        })(0);
    })();
})();

</script>
