<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATAROS 168</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/ttr.png">
    <style>
        :root {
            --gold: #c9a84c; --gold-light: #e8c96a; --gold-dark: #8a6a1e;
            --red: #e03030; --blue: #3a7bd5; --pink: #c26a8a; --green: #22c55e;
            --bg: #080809; --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.07);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none !important; user-select:none !important; }
        body { font-family:'Rajdhani',sans-serif; background:var(--bg); color:#fff; min-height:100vh; overflow-x:hidden; }
        .bg-wrap { position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse 80% 60% at 50% -10%,rgba(201,168,76,0.12) 0%,transparent 60%), radial-gradient(ellipse 50% 40% at 90% 90%,rgba(201,168,76,0.06) 0%,transparent 50%), url('https://img1.pic.in.th/images/655261258_896597270043992_7434535868983744998_n.jpg') center/cover no-repeat; }
        .bg-wrap::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(8,8,9,0.82) 0%,rgba(8,8,9,0.97) 100%); }
        .scanlines { position:fixed; inset:0; z-index:1; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px); }
        body::before { content:''; position:fixed; inset:0; z-index:1; pointer-events:none; opacity:0.025; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        .ember { position:fixed; width:2px; height:2px; border-radius:50%; background:var(--gold); box-shadow:0 0 6px var(--gold-light); pointer-events:none; z-index:2; opacity:0; animation:emberFall linear infinite; }
        @keyframes emberFall { 0%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0} 10%{opacity:1;transform:translate(calc(var(--sx) + 10px),calc(var(--sy) + 30px)) scale(1)} 90%{opacity:.6} 100%{transform:translate(calc(var(--sx) + 500px),calc(var(--sy) + 100vh)) scale(0);opacity:0} }
        .page { position:relative; z-index:10; }
        .header { text-align:center; padding:90px 20px 40px; }
        .header-eyebrow { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:6px; color:var(--gold); opacity:.7; margin-bottom:12px; }
        .logo { font-family:'Bebas Neue',sans-serif; font-size:clamp(5rem,12vw,10rem); letter-spacing:.06em; line-height:.9; background:linear-gradient(180deg,#fff 0%,#c9a84c 50%,#8a6a1e 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 40px rgba(201,168,76,.3)); }
        .logo-sub { font-family:'Space Mono',monospace; font-size:12px; letter-spacing:8px; color:rgba(255,255,255,.3); margin-top:10px; }
        .divider { width:120px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:20px auto; }
        .topbar { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; gap:10px; padding:14px 20px; background:linear-gradient(180deg,rgba(8,8,9,.95) 0%,transparent 100%); backdrop-filter:blur(8px); }
        .topbar-btn { width:42px; height:42px; border-radius:10px; background:rgba(201,168,76,.08); border:1px solid rgba(201,168,76,.2); color:var(--gold); display:flex; align-items:center; justify-content:center; text-decoration:none; font-size:14px; transition:.2s; flex-shrink:0; }
        .topbar-btn:hover { background:rgba(201,168,76,.15); border-color:var(--gold); }
        .search-wrap { flex:1; position:relative; max-width:480px; margin:0 auto; }
        .search-wrap input { width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:11px 16px 11px 42px; color:#fff; font-family:'Rajdhani',sans-serif; font-size:15px; outline:none; transition:.3s; }
        .search-wrap input:focus { border-color:rgba(201,168,76,.4); background:rgba(201,168,76,.05); }
        .search-wrap input::placeholder { color:rgba(255,255,255,.2); }
        .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.25); font-size:13px; }
        .stats-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; max-width:1100px; margin:0 auto 50px; padding:0 20px; }
        @media(max-width:700px){ .stats-grid{grid-template-columns:repeat(2,1fr)} .stats-grid .stat-card:last-child{grid-column:span 2} }
        .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px 12px; text-align:center; position:relative; overflow:hidden; transition:.4s; }
        .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--c,var(--gold)); box-shadow:0 0 12px var(--c,var(--gold)); opacity:.6; }
        .stat-card:hover { transform:translateY(-6px); background:rgba(255,255,255,.05); }
        .stat-num { font-family:'Bebas Neue',sans-serif; font-size:3rem; color:var(--c,var(--gold)); text-shadow:0 0 20px var(--c,var(--gold)); display:block; line-height:1; }
        .stat-lbl { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(255,255,255,.4); text-transform:uppercase; margin-top:6px; }
        .section-title { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:.12em; display:flex; align-items:center; gap:14px; margin:40px 0 18px; }
        .section-title::before { content:''; width:4px; height:28px; background:var(--accent,var(--gold)); box-shadow:0 0 10px var(--accent,var(--gold)); border-radius:2px; flex-shrink:0; }
        .section-title .cnt { font-family:'Space Mono',monospace; font-size:12px; letter-spacing:2px; color:rgba(255,255,255,.3); }
        .members-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
        .member-card { position:relative; background:linear-gradient(135deg,rgba(18,18,22,.9),rgba(10,10,12,.98)); border:1px solid rgba(255,255,255,.06); border-radius:14px; padding:18px; display:flex; align-items:center; gap:16px; cursor:pointer; overflow:hidden; transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s,border-color .35s; }
        .member-card::after { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--ac),transparent); opacity:.5; transition:.4s; }
        .member-card:hover { transform:translateY(-6px) scale(1.015); border-color:rgba(255,255,255,.12); box-shadow:0 20px 50px rgba(0,0,0,.6); }
        .member-card:hover::after { opacity:1; }
        .av-wrap { position:relative; flex-shrink:0; width:72px; height:72px; }
        .av-wrap .avatar,.av-wrap video { width:72px; height:72px; border-radius:12px; object-fit:cover; border:2px solid rgba(255,255,255,.08); transition:.3s; display:block; }
        .member-card:hover .av-wrap .avatar,.member-card:hover .av-wrap video { border-color:var(--ac); box-shadow:0 0 18px rgba(var(--ac-rgb,201,168,76),.4); }
        .online-dot { position:absolute; bottom:-3px; right:-3px; width:14px; height:14px; background:var(--green); border:2px solid #080809; border-radius:50%; box-shadow:0 0 10px var(--green); }
        .card-info { flex:1; min-width:0; }
        .card-rank { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--ac); text-transform:uppercase; margin-bottom:4px; }
        .card-name { font-family:'Bebas Neue',sans-serif; font-size:1.45rem; letter-spacing:.05em; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .card-fb { position:absolute; right:16px; bottom:-40px; opacity:0; transition:.3s ease; }
        .member-card:hover .card-fb { bottom:16px; opacity:1; }
        .fb-pill { background:var(--ac); color:#000; font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:2px; text-decoration:none; padding:7px 14px; border-radius:8px; display:flex; align-items:center; gap:6px; transition:.2s; }
        .container { max-width:1200px; margin:0 auto; padding:0 20px 60px; }
        .pagination { display:flex; justify-content:center; align-items:center; gap:8px; margin:40px 0; }
        .pg-btn { width:44px; height:44px; border-radius:10px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.03); color:#fff; font-family:'Space Mono',monospace; font-size:13px; cursor:pointer; transition:.2s; }
        .pg-btn:hover { background:rgba(255,255,255,.08); }
        .pg-btn.active { background:var(--gold); color:#000; border-color:var(--gold); box-shadow:0 0 16px rgba(201,168,76,.4); font-weight:700; }
        .pg-arrow { background:none; border:none; color:var(--gold); font-size:18px; cursor:pointer; padding:0 8px; transition:.2s; }
        .pg-arrow:disabled { opacity:.2; cursor:not-allowed; }
        .music-widget { position:fixed; bottom:24px; right:24px; background:rgba(12,12,15,.9); backdrop-filter:blur(20px); border:1px solid rgba(201,168,76,.15); border-radius:16px; padding:12px 18px; display:flex; align-items:center; gap:12px; cursor:pointer; z-index:999; transition:.3s; box-shadow:0 10px 40px rgba(0,0,0,.6); }
        .music-widget:hover { border-color:rgba(201,168,76,.4); transform:translateY(-3px); }
        .music-art { width:40px; height:40px; background:url('https://img2.pic.in.th/ttr.png') center/cover; border-radius:8px; }
        .music-info .t1 { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:2px; color:var(--gold); }
        .music-info .t2 { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px; color:rgba(255,255,255,.3); margin-top:2px; }
        .music-play { font-size:18px; color:var(--gold); margin-left:4px; }
        @keyframes rotateArt { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        #memberModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(20px); z-index:9999; justify-content:center; align-items:center; animation:fadeIn .3s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .modal-card { background:rgba(12,12,15,.98); border:1px solid rgba(255,255,255,.08); border-radius:20px; width:92%; max-width:760px; display:flex; overflow:hidden; position:relative; animation:popIn .35s cubic-bezier(.34,1.56,.64,1) forwards; }
        @keyframes popIn { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
        .modal-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--modal-ac,var(--gold)),transparent); animation:scanLine 3s linear infinite; }
        @keyframes scanLine { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
        .modal-left { flex:0 0 280px; position:relative; overflow:hidden; }
        #modalMedia { width:100%; height:100%; background-size:cover; background-position:center; min-height:320px; }
        #modalMedia video { width:100%; height:100%; object-fit:cover; display:block; }
        .modal-left::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent 60%,rgba(12,12,15,.8) 100%); }
        .modal-right { flex:1; padding:44px 36px; display:flex; flex-direction:column; justify-content:center; }
        .modal-eyebrow { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:4px; color:#3a7bd5; margin-bottom:8px; }
        #modalName { font-family:'Bebas Neue',sans-serif; font-size:3.2rem; letter-spacing:.04em; line-height:1; margin-bottom:4px; }
        #modalRank { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:3px; margin-bottom:28px; }
        .modal-bio { background:rgba(255,255,255,.03); border-left:3px solid var(--modal-ac,var(--gold)); padding:16px 18px; font-size:14px; color:rgba(255,255,255,.5); font-style:italic; line-height:1.6; margin-bottom:32px; border-radius:0 6px 6px 0; }
        .modal-btns { display:flex; gap:12px; }
        .btn-fb-modal { background:var(--modal-ac,var(--gold)); color:#000; padding:14px 24px; font-family:'Space Mono',monospace; font-size:11px; font-weight:700; letter-spacing:2px; text-decoration:none; border-radius:10px; display:flex; align-items:center; gap:8px; transition:.25s; }
        .btn-fb-modal:hover { filter:brightness(1.15); transform:translateY(-2px); }
        .btn-close-modal { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.6); padding:14px 20px; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:2px; border-radius:10px; cursor:pointer; transition:.25s; }
        .btn-close-modal:hover { background:rgba(255,255,255,.1); color:#fff; }
        .close-x { position:absolute; top:16px; right:16px; color:rgba(255,255,255,.3); font-size:20px; cursor:pointer; z-index:10; transition:.2s; padding:8px; }
        .close-x:hover { color:#fff; transform:rotate(90deg); }
        @media(max-width:600px){ .modal-card{flex-direction:column;max-width:360px} .modal-left{flex:none;height:220px} .modal-right{padding:28px 22px} #modalName{font-size:2.4rem} }
        #no-result-msg { text-align:center; padding:60px 20px; color:rgba(255,255,255,.2); font-family:'Space Mono',monospace; font-size:13px; letter-spacing:3px; }
        /* LOADING */
        #loadingScreen { position:fixed; inset:0; z-index:9998; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; transition:opacity .5s; }
        .ld-logo { font-family:'Bebas Neue',sans-serif; font-size:4rem; letter-spacing:.1em; background:linear-gradient(180deg,#fff,var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .ld-bar-wrap { width:200px; height:2px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; }
        .ld-bar { height:100%; background:var(--gold); border-radius:2px; animation:ldAnim 1.5s ease forwards; }
        @keyframes ldAnim { from{width:0} to{width:100%} }
        .ld-txt { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:4px; color:rgba(255,255,255,.3); }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="ld-logo">TATAROS</div>
    <div class="ld-bar-wrap"><div class="ld-bar"></div></div>
    <div class="ld-txt">LOADING MEMBERS...</div>
</div>

<div class="bg-wrap"></div>
<div class="scanlines"></div>

<div class="topbar">
    <a href="index.html" class="topbar-btn"><i class="fas fa-home"></i></a>
    <a href="https://www.facebook.com/profile.php?id=100077878680394" target="_blank" class="topbar-btn"><i class="fab fa-facebook"></i></a>
    <div class="search-wrap">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="memberSearch" placeholder="ค้นหาสมาชิก...">
    </div>
</div>

<div class="page">
    <div class="header">
        <div class="header-eyebrow">MEMBER TATAROS</div>
        <div class="logo">TATAROS</div>
        <div class="logo-sub">LASTNAME TATAROS</div>
        <div class="divider"></div>
    </div>
    <div class="stats-grid" id="statsBar"></div>
    <div class="container" id="memberContent"></div>
    <div class="pagination" id="pagination-controls"></div>
</div>

<div class="music-widget" id="musicToggle">
    <div class="music-art" id="musicArt"></div>
    <div class="music-info">
        <div class="t1">TATAROS</div>
        <div class="t2">168 · NOW PLAYING</div>
    </div>

</div>
<audio id="bgMusic" loop src="https://www.dropbox.com/scl/fi/7xa56mo552u72xuk4jeqo/TATAROS-Mv.mp3?rlkey=i2thg4kw1xplqx505bxy3ltif&st=fv83d7oa&raw=1"></audio>

<div id="memberModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-card" id="modalCard">
        <i class="fas fa-times close-x" onclick="closeModal()"></i>
        <div class="modal-left"><div id="modalMedia"></div></div>
        <div class="modal-right">
            <div class="modal-eyebrow">168 · TATAROS REGISTRY</div>
            <h2 id="modalName"></h2>
            <div id="modalRank"></div>
            <div class="modal-bio">พวกกูTATAROS</div>
            <div class="modal-btns">
                <a id="modalFB" href="#" target="_blank" class="btn-fb-modal"><i class="fab fa-facebook"></i>FACEBOOK</a>
                <button class="btn-close-modal" onclick="closeModal()">CLOSE</button>
            </div>
        </div>
    </div>
</div>

<script>
// ══════════════════════════════════════════
//  🔧 ตั้งค่า Google Sheets ตรงนี้
// ══════════════════════════════════════════
const SHEET_ID   = '1UjtK94IqfBtbyZba-uf_epISKud-1FhESV7gkANxHrg';
const SHEET_NAME = 'Sheet1'; // ชื่อ tab ใน Sheets
// ══════════════════════════════════════════

const rankConfig = {
    theboss:{ label:'THE BOSS', color:'#c9a84c', rgb:'201,168,76' },
    leader: { label:'LEADER',   color:'#e03030', rgb:'224,48,48'  },
    staff:  { label:'STAFF',    color:'#c26a8a', rgb:'194,106,138'},
    member: { label:'MEMBER',   color:'#3a7bd5', rgb:'58,123,213' },
};

let members = [];
let currentPage = 1;
const PER_PAGE  = 12;

// ─── ดึงข้อมูลจาก Sheets ───
async function fetchMembers() {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    try {
        const res  = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47, text.length - 2));
        members = json.table.rows.map(row => ({
            name:     row.c[0]?.v || '',
            rank:    (row.c[1]?.v || 'member').toLowerCase().trim(),
            facebook: row.c[2]?.v || '#',
            avatar:   row.c[3]?.v || 'https://img2.pic.in.th/Unknown_person.jpg',
        })).filter(m => m.name);
    } catch(e) {
        console.error('โหลดข้อมูลไม่ได้:', e);
        members = [];
    }
}

function mediaEl(src, cls='avatar') {
    if (src && (src.endsWith('.mp4') || src.endsWith('.webm')))
        return `<video src="${src}" class="${cls}" autoplay loop muted playsinline></video>`;
    return `<img src="${src}" class="${cls}" onerror="this.src='https://img2.pic.in.th/Unknown_person.jpg'">`;
}

function renderStats() {
    const g = [
        {k:'theboss',l:'THE BOSS',c:'#c9a84c'},
        {k:'leader', l:'LEADER',  c:'#e03030'},
        {k:'staff',  l:'STAFF',   c:'#c26a8a'},
        {k:'member', l:'MEMBER',  c:'#3a7bd5'},
        {k:'_total', l:'TOTAL',   c:'#ffffff'},
    ];
    document.getElementById('statsBar').innerHTML = g.map(x => {
        const n = x.k==='_total' ? members.length : members.filter(m=>m.rank===x.k).length;
        return `<div class="stat-card" style="--c:${x.c}"><span class="stat-num">${n}</span><span class="stat-lbl">${x.l}</span></div>`;
    }).join('');
}

function sectionHTML(title, grp, color, rgb, rankKey, total) {
    const cards = grp.map(m => `
        <div class="member-card" style="--ac:${color};--ac-rgb:${rgb}"
             onclick="openModal('${m.name.replace(/'/g,"\\'")}','${title.replace(/S$/,'')}','${m.avatar.replace(/'/g,"\\'")}','${m.facebook.replace(/'/g,"\\'")}','${color}')">
            <div class="av-wrap">${mediaEl(m.avatar)}<div class="online-dot"></div></div>
            <div class="card-info">
                <div class="card-rank">${title.replace(/S$/,'')}</div>
                <div class="card-name">${m.name}</div>
            </div>
            <div class="card-fb">
                <a href="${m.facebook}" target="_blank" class="fb-pill" onclick="event.stopPropagation()">
                    <i class="fab fa-facebook"></i>PROFILE
                </a>
            </div>
        </div>`).join('');
    return `<h2 class="section-title" style="--accent:${color}" id="rank-${rankKey}">${title} <span class="cnt">/ ${total}</span></h2><div class="members-grid">${cards}</div>`;
}

function renderMembers() {
    let html = '';
    ['theboss','leader','staff'].forEach(r => {
        const cfg = rankConfig[r];
        const grp = members.filter(m => m.rank===r);
        if (grp.length) html += sectionHTML(cfg.label+'S', grp, cfg.color, cfg.rgb, r, grp.length);
    });
    const allMem = members.filter(m => m.rank==='member');
    const pages  = Math.ceil(allMem.length / PER_PAGE);
    const sliced = allMem.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);
    if (sliced.length) html += sectionHTML('MEMBERS', sliced, rankConfig.member.color, rankConfig.member.rgb, 'member', allMem.length);
    document.getElementById('memberContent').innerHTML = html || '<div id="no-result-msg"><i class="fas fa-ghost" style="display:block;font-size:28px;margin-bottom:12px"></i>ยังไม่มีข้อมูล</div>';
    renderPagination(pages);
}

function renderPagination(total) {
    const el = document.getElementById('pagination-controls');
    if (total<=1){el.innerHTML='';return;}
    let h = `<button class="pg-arrow" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
    for(let i=1;i<=total;i++) h += `<button class="pg-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    h += `<button class="pg-arrow" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
    el.innerHTML = h;
}
function goPage(p){currentPage=p;renderMembers();document.getElementById('rank-member')?.scrollIntoView({behavior:'smooth'});}

function openModal(name,rank,img,fb,color){
    const card = document.getElementById('modalCard');
    card.style.setProperty('--modal-ac',color);
    document.getElementById('modalName').innerText = name;
    document.getElementById('modalRank').innerText = rank+' / TATAROS';
    document.getElementById('modalRank').style.cssText += `;color:${color};text-shadow:0 0 15px ${color}`;
    document.getElementById('modalFB').href = fb;
    const media = document.getElementById('modalMedia');
    if (img && (img.endsWith('.mp4')||img.endsWith('.webm'))) {
        media.style.backgroundImage='none';
        media.innerHTML=`<video src="${img}" autoplay loop muted playsinline style="width:100%;height:100%;object-fit:cover"></video>`;
    } else {
        media.innerHTML='';
        media.style.cssText='background-size:cover;background-position:center;min-height:320px;background-image:url(\''+img+'\')';
    }
    document.getElementById('memberModal').style.display='flex';
}
function closeModal(){
    const modal=document.getElementById('memberModal'),card=document.getElementById('modalCard');
    card.style.cssText+='transform:scale(.9);opacity:0;transition:.2s';
    setTimeout(()=>{modal.style.display='none';card.style.transform='';card.style.opacity='';},200);
}

document.getElementById('memberSearch').addEventListener('input', function(){
    const term=this.value.toLowerCase().trim();
    const content=document.getElementById('memberContent');
    if(!term){currentPage=1;renderMembers();return;}
    const filtered=members.filter(m=>m.name.toLowerCase().includes(term));
    if(!filtered.length){content.innerHTML='<div id="no-result-msg"><i class="fas fa-search" style="display:block;font-size:28px;margin-bottom:12px"></i>ไม่พบสมาชิก</div>';document.getElementById('pagination-controls').innerHTML='';return;}
    const grouped={};
    filtered.forEach(m=>{if(!grouped[m.rank])grouped[m.rank]=[];grouped[m.rank].push(m);});
    let html='';
    ['theboss','leader','staff','member'].forEach(r=>{
        if(!grouped[r])return;
        const cfg=rankConfig[r];
        html+=sectionHTML(cfg.label+'S',grouped[r],cfg.color,cfg.rgb,r,grouped[r].length);
    });
    content.innerHTML=html;
    document.getElementById('pagination-controls').innerHTML='';
});

// Music
const audio=document.getElementById('bgMusic'),art=document.getElementById('musicArt'),playBtn=document.getElementById('playStatus');
audio.volume=0.5;
function toggleMusic(){if(audio.paused){audio.play().then(()=>{playBtn.innerText='⏸';art.style.animation='rotateArt 4s linear infinite';}).catch(()=>{});}else{audio.pause();playBtn.innerText='▶';art.style.animation='none';}}
document.getElementById('musicToggle').addEventListener('click',e=>{e.stopPropagation();toggleMusic();});
window.addEventListener('load',()=>{audio.play().then(()=>{playBtn.innerText='⏸';art.style.animation='rotateArt 4s linear infinite';}).catch(()=>{document.addEventListener('click',()=>{if(audio.paused)toggleMusic();},{once:true});});});

// Embers
function spawnEmber(){const e=document.createElement('div');e.className='ember';const sx=Math.random()*window.innerWidth*.7-50,sy=-Math.random()*150,dur=(Math.random()*4+4)+'s';e.style.setProperty('--sx',sx+'px');e.style.setProperty('--sy',sy+'px');e.style.animationDuration=dur;e.style.animationDelay=(Math.random()*2)+'s';e.style.width=e.style.height=(Math.random()*2.5+1)+'px';document.body.appendChild(e);setTimeout(()=>e.remove(),(parseFloat(dur)+3)*1000);}
setInterval(spawnEmber,220);

// Anti-devtools
(function(){document.addEventListener('contextmenu',e=>e.preventDefault());document.onkeydown=function(e){
    if(e.keyCode==123)return false;
    if(e.ctrlKey&&e.shiftKey&&[73,74,67].includes(e.keyCode))return false;
    if(e.ctrlKey&&[85,83].includes(e.keyCode))return false;
    if(e.metaKey&&e.keyCode==83)return false;
    if(e.metaKey&&e.shiftKey&&e.keyCode==83)return false;
    if(e.keyCode==44)return false;
};setInterval(function(){if(window.outerWidth-window.innerWidth>160||window.outerHeight-window.innerHeight>160){document.body.innerHTML="<h1 style='color:#c9a84c;font-family:monospace;padding:40px'>ACCESS DENIED</h1>";}},500);})();

// Init
(async()=>{
    await fetchMembers();
    renderStats();
    renderMembers();
    const ls=document.getElementById('loadingScreen');
    ls.style.opacity='0';
    setTimeout(()=>ls.style.display='none',500);
})();
</script>
